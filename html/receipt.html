<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نتیجه تراکنش | Payment Result</title>
    <link rel="stylesheet" href="../styles/pages/recipt.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="receipt-wrapper">
      <div class="receipt-card" id="receiptCard">
        <!-- Icon & Header -->
        <div class="receipt-header" id="receiptHeader">
          <div class="status-icon" id="statusIcon">
            <i class="fas fa-check" id="iconElement"></i>
          </div>
          <h2 id="receiptTitle">در حال بررسی تراکنش...</h2>
          <p id="receiptSubtitle">لطفاً چند لحظه صبر کنید</p>
        </div>

        <!-- Details Box -->
        <div class="receipt-details">
          <div class="receipt-row">
            <span>وضعیت تراکنش:</span>
            <span id="statusBadge" class="badge">در حال بررسی</span>
          </div>
          <div class="receipt-row">
            <span>شماره پیگیری (تراکنش):</span>
            <strong id="trxId">TRX-98432176</strong>
          </div>
          <div class="receipt-row">
            <span>کد رهگیری سفارش:</span>
            <strong id="orderId">#ORD-98432</strong>
          </div>
          <div class="receipt-row">
            <span>مبلغ تراکنش:</span>
            <strong class="price-text">۳۳,۰۰۰,۰۰۰ تومان</strong>
          </div>
          <div class="receipt-row">
            <span>تاریخ و ساعت:</span>
            <strong>۲۸ تیر ۱۴۰۴ - ۱۶:۴۵</strong>
          </div>
        </div>

        <!-- Actions -->
        <div class="receipt-actions" id="receiptActions"></div>
      </div>
    </div>

    <script src="../scripts/api.js"></script>
    <script src="../scripts/app-shell.js"></script>
    <script src="../scripts/recipt.js"></script>
  </body>
</html>
